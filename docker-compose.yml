services:
  backend:
    build:
      context: ./backend
      target: dev
    ports:
      - "8000:8000"
    environment:
      QUIZ_SHOW_ANSWER_REVIEW: "true"
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - .venv/
            - __pycache__/
            - "*.pyc"
        - action: rebuild
          path: ./backend/pyproject.toml

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
    depends_on:
      - backend
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app/frontend
          ignore:
            - node_modules/
            - .next/
            - out/
        - action: rebuild
          path: ./frontend/package.json

volumes:
  backend_venv:
